<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Influência 5.0 — Hub de Agentes</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
    body.light { background: #f4f4f4 !important; color: #111 !important; }
    body.light .login-container { background: linear-gradient(135deg, #e0e0e0 0%, #f4f4f4 100%); }
    body.light .login-box { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.1); }
    body.light .login-box h1, body.light .login-box input { color: #111; }
    body.light .login-box p { color: rgba(0,0,0,0.6); }
    body.light .login-box input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
    body.light .login-box input::placeholder { color: rgba(0,0,0,0.3); }
    body.light .login-box button { background: #111; color: #fff; }
    body.light .hub-container { background: #f4f4f4; }
    body.light .hub-header p { color: rgba(0,0,0,0.5); }
    body.light .hub-header hr { background: rgba(0,0,0,0.1); }
    body.light .agent-card { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.1); }
    body.light .agent-card:hover { border-color: rgba(0,0,0,0.3); background: rgba(0,0,0,0.05); }
    body.light .agent-number { color: rgba(0,0,0,0.3); }
    body.light .agent-card h2 { color: #111; }
    body.light .agent-card p { color: rgba(0,0,0,0.6); }
    body.light .agent-card a { color: rgba(0,0,0,0.5); }
    body.light .chat-container { background: #f4f4f4; }
    body.light .chat-header { border-color: rgba(0,0,0,0.1); color: #111; }
    body.light .chat-header h2 { color: #111; }
    body.light .chat-header button { background: rgba(0,0,0,0.1); color: #111; }
    body.light .message.user .message-content { background: rgba(0,0,0,0.08); color: #111; }
    body.light .message.assistant .message-content { background: rgba(0,0,0,0.04); color: #111; }
    body.light .chat-input-area { border-color: rgba(0,0,0,0.1); }
    body.light .chat-input-area input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #111; }
    body.light .chat-input-area input::placeholder { color: rgba(0,0,0,0.3); }
    body.light .chat-input-area button { background: #111; color: #fff; }
    body.light .footer { color: rgba(0,0,0,0.3); border-color: rgba(0,0,0,0.05); }
    .theme-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 9999; border-radius: 50%; width: 42px; height: 42px; font-size: 20px; cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    body.light .theme-toggle { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.2); }
    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); }
    .login-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); }
    .login-box h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
    .login-box p { text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 30px; }
    .login-box input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 20px; }
    .login-box input::placeholder { color: rgba(255,255,255,0.3); }
    .login-box button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.3s; }
    .login-box button:hover { background: rgba(255,255,255,0.9); }
    .login-error { color: #ff6b6b; font-size: 12px; text-align: center; margin-top: 10px; display: none; }
    .hub-container { display: none; min-height: 100vh; background: #000; padding: 40px 20px; }
    .hub-container.active { display: block; }
    .hub-header { text-align: center; margin-bottom: 60px; }
    .hub-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; margin-bottom: 10px; }
    .hub-header p { color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
    .hub-header hr { width: 300px; height: 1px; border: none; background: rgba(255,255,255,0.1); margin: 30px auto; }
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1400px; margin: 0 auto; }
    .agent-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 30px; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; gap: 20px; }
    .agent-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); transform: translateY(-4px); }
    .agent-number { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; }
    .agent-card h2 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .agent-card p { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; flex-grow: 1; }
    .agent-card a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; align-self: flex-start; transition: color 0.3s; }
    .agent-card a:hover { color: #fff; }
    .chat-container { display: none; flex-direction: column; height: 100vh; background: #000; }
    .chat-container.active { display: flex; }
    .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .chat-header h2 { font-size: 18px; }
    .chat-header button { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .chat-messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .message { display: flex; gap: 15px; animation: slideIn 0.3s ease-out; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .message-content { max-width: 70%; padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.6; word-break: break-word; overflow-wrap: break-word; overflow: visible; }
    .message.user .message-content { background: rgba(255,255,255,0.1); }
    .message.assistant .message-content { background: rgba(255,255,255,0.05); }
    .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
    .typing-indicator span { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .chat-input-area { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
    .chat-input-area input, .chat-input-area textarea { flex-grow: 1; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; resize: none; overflow-y: auto; max-height: 200px; min-height: 44px; line-height: 1.5; font-family: inherit; transition: height 0.1s ease; }
    .chat-input-area input::placeholder, .chat-input-area textarea::placeholder { color: rgba(255,255,255,0.3); }
    .chat-input-area button { padding: 12px 24px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.3s; }
    .chat-input-area button:hover:not(:disabled) { background: rgba(255,255,255,0.9); }
    .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
    @media (max-width: 768px) { .agents-grid { grid-template-columns: 1fr; } .hub-header h1 { font-size: 32px; } .chat-messages { padding: 15px; } .message-content { max-width: 95%; } .login-box { padding: 30px 20px; } }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
<script>
function toggleTheme() {
  var l = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = l ? '☀️' : '🌙';
  localStorage.setItem('theme', l ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.addEventListener('DOMContentLoaded', function() {
    var b = document.getElementById('themeBtn');
    if (b) b.textContent = '☀️';
  });
}
</script>

<div class="login-container" id="loginContainer">
  <div class="login-box">
    <h1>INFLUÊNCIA 5.0</h1>
    <p>Inteligência Artificial Aplicada para Mídia e Marketing</p>
    <input type="password" id="passwordInput" placeholder="Senha de acesso" />
    <button onclick="validatePassword()">Acessar</button>
    <div class="login-error" id="loginError">Senha incorreta</div>
  </div>
</div>

<div class="hub-container" id="hubContainer">
  <div class="hub-header">
    <h1>INFLUÊNCIA 5.0</h1>
    <p>Inteligência Artificial Aplicada</p>
    <hr>
    <p>12 agentes especializados em estratégia, criação e performance</p>
  </div>
  <div class="agents-grid" id="agentsGrid"></div>
  <div class="footer">Influência 5.0 — Todos os direitos reservados</div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <h2 id="chatTitle">Chat</h2>
    <button onclick="backToHub()">Voltar ao Hub</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <textarea id="chatInput" placeholder="Digite sua mensagem..." rows="1" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,200)+'px'"></textarea>
    <button id="sendButton" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
const agents = [
  { id: 'ooh', name: 'PLANEJAMENTO OOH', description: 'Estratégia de mídia externa. Análise de impactos, cobertura e potencial de alcance em campanhas out-of-home.', systemPrompt: 'Você é um especialista em mídia OOH (Out-of-Home). Nunca use emojis. Seja direto, analítico e baseado em dados.' },
  { id: 'busdoor', name: 'PLANEJAMENTO BUSDOOR', description: 'Especialista em mídia em transportes. Dados: 8.500 impactos/dia por ônibus. População SP: 11,45M.', systemPrompt: 'Você é um especialista em mídia em transportes (busdoor). 8.500 impactos/dia por ônibus. Nunca use emojis.' },
  { id: 'traffic', name: 'GESTOR DE TRÁFEGO', description: 'Gestão de campanhas de mídia paga. Otimização de investimento, ROAS e performance em tempo real.', systemPrompt: 'Você é um gestor de tráfego experiente. Nunca use emojis. Foque em resultados mensuráveis.' },
  { id: 'media-opt', name: 'OTIMIZADOR DE MÍDIA ON', description: 'Otimização de campanhas digitais. Análise de dados, segmentação de público e maximização de conversão.', systemPrompt: 'Você é um otimizador de mídia online. Nunca use emojis. Priorize ROI.' },
  { id: 'sdr', name: 'SDR — CONVERSÃO DE VENDAS', description: 'Especialista em fechamento de vendas. Qualificação de leads, argumentação consultiva e aceleração de pipeline.', systemPrompt: 'Você é um SDR experiente. Nunca use emojis. Foque em criar valor.' },
  { id: 'vp-marketing', name: 'VP DE MARKETING', description: 'Estratégia geral de marketing. Alinhamento de mensagem, posicionamento de marca e orquestração de ações.', systemPrompt: 'Você é um VP de Marketing com visão estratégica. Nunca use emojis. Seja claro sobre objetivos.' },
  { id: 'vp-criacao', name: 'VP DE CRIAÇÃO', description: 'Direção criativa estratégica. Conceituação, direção de arte e qualidade de execução criativa.', systemPrompt: 'Você é um VP de Criação com expertise em direção criativa. Nunca use emojis. Priorize impacto.' },
  { id: 'copywriter', name: 'REDATOR SÊNIOR', description: 'Redação persuasiva e criativa. Copy de campanha, headlines e storytelling que gera engajamento.', systemPrompt: 'Você é um redator sênior expert em copy persuasivo. Nunca use emojis. Priorize engajamento.' },
  { id: 'art-director', name: 'DIRETOR DE ARTE', description: 'Direção visual e execução de design. Estética, composição visual e qualidade de produção.', systemPrompt: 'Você é um diretor de arte experiente. Nunca use emojis. Priorize impacto visual.' },
  { id: 'vp-digital', name: 'VP PLANEJAMENTO DIGITAL', description: 'Estratégia digital integrada. Planejamento de jornada do cliente, arquitetura digital e tecnologia.', systemPrompt: 'Você é um VP de Planejamento Digital com visão estratégica. Nunca use emojis. Foque em experiência.' },
  { id: 'media-manager', name: 'GERENTE DE MÍDIA OFF', description: 'Gestão de mídia offline. Planejamento, negociação e execução de campanhas em mídia tradicional.', systemPrompt: 'Você é um gerente de mídia offline. Nunca use emojis. Foque em eficiência de investimento.' },
  { id: 'account-director', name: 'DIRETOR DE ATENDIMENTO', description: 'Gestão de relacionamento com cliente. Alinhamento estratégico, comunicação e satisfação de cliente.', systemPrompt: 'Você é um diretor de atendimento com expertise em relacionamento. Nunca use emojis. Priorize satisfação.' }
];

let currentAgent = null;
let chatHistory = [];

function getStorageKey() {
  return 'chat_' + (currentAgent ? currentAgent.id : 'default');
}
function saveHistory() {
  localStorage.setItem(getStorageKey(), JSON.stringify(chatHistory));
}
function loadHistory() {
  var saved = localStorage.getItem(getStorageKey());
  chatHistory = saved ? JSON.parse(saved) : [];
}
function clearHistory() {
  localStorage.removeItem(getStorageKey());
  chatHistory = [];
  var msgs = document.getElementById('chatMessages');
  if (msgs) msgs.innerHTML = '';
}

function validatePassword() {
  const password = document.getElementById('passwordInput').value;
  if (password === '2026influencia') {
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('hubContainer').classList.add('active');
    renderAgents();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function renderAgents() {
  const grid = document.getElementById('agentsGrid');
  grid.innerHTML = agents.map((agent, index) => `
    <div class="agent-card" onclick="openAgent('${agent.id}')">
      <div class="agent-number">0${index + 1}</div>
      <h2>${agent.name}</h2>
      <p>${agent.description}</p>
      <a href="#">CONVERSAR →</a>
    </div>
  `).join('');
}

function openAgent(agentId) {
  currentAgent = agents.find(a => a.id === agentId);
  loadHistory();
  var msgs = document.getElementById('chatMessages');
  if (msgs) {
    msgs.innerHTML = '';
    chatHistory.forEach(function(msg) {
      if (msg.role === 'user') appendMessage('user', msg.content);
      else if (msg.role === 'assistant') appendMessage('assistant', msg.content);
    });
  }
  document.getElementById('hubContainer').classList.remove('active');
  document.getElementById('chatContainer').classList.add('active');
  document.getElementById('chatTitle').textContent = currentAgent.name;
  document.getElementById('chatMessages').innerHTML = '';
  addMessage('assistant', 'Olá! Como posso ajudá-lo?');
}

function backToHub() {
  document.getElementById('chatContainer').classList.remove('active');
  document.getElementById('hubContainer').classList.add('active');
  saveHistory();
  currentAgent = null;
  chatHistory = [];
}

function addMessage(role, content) {
  const messagesDiv = document.getElementById('chatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${role}`;
  messageDiv.innerHTML = `<div class="message-content">${role === "assistant" ? marked.parse(content) : escapeHtml(content)}</div>`;
  messagesDiv.appendChild(messageDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addLoading() {
  const messagesDiv = document.getElementById('chatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message assistant';
  messageDiv.id = 'loadingMessage';
  messageDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
  messagesDiv.appendChild(messageDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeLoading() {
  const loading = document.getElementById('loadingMessage');
  if (loading) loading.remove();
}

function appendMessage(role, content) {
  const messagesDiv = document.getElementById('chatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message ' + role;
  messageDiv.innerHTML = '<div class="message-content">' + (role === 'assistant' ? marked.parse(content) : escapeHtml(content)) + '</div>';
  messagesDiv.appendChild(messageDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  addMessage('user', message);
  chatHistory.push({ role: 'user', content: message }); saveHistory();
  input.value = '';

  const button = document.getElementById('sendButton');
  button.disabled = true;
  input.disabled = true;
  addLoading();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory, systemPrompt: currentAgent.systemPrompt, agentId: currentAgent.id })
    });
    if (!response.ok) throw new Error('Erro ao chamar API');
    const data = await response.json();
    removeLoading();
    addMessage('assistant', data.message);
    chatHistory.push({ role: 'assistant', content: data.message }); saveHistory();
  } catch (error) {
    removeLoading();
    addMessage('assistant', 'Desculpe, ocorreu um erro. Tente novamente.');
  } finally {
    button.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') validatePassword();
  });
});

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
